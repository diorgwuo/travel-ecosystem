version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.4
    container_name: travel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: travel_ecosystem
      POSTGRES_USER: travel_user
      POSTGRES_PASSWORD: travel_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travel_user -d travel_ecosystem"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ../travel-ecosystem
    container_name: travel-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/travel_ecosystem
      SPRING_DATASOURCE_USERNAME: travel_user
      SPRING_DATASOURCE_PASSWORD: travel_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: .
    container_name: travel-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data: