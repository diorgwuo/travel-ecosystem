services:
  backend:
    build: ../travel-ecosystem
    container_name: travel-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://213.165.209.136:5432/school-db
      SPRING_DATASOURCE_USERNAME: travel_user
      SPRING_DATASOURCE_PASSWORD: travel_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

  frontend:
    build: ../VKR
    container_name: travel-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend