spring:
  application:
    name: travel-ecosystem

  datasource:
    url: travel-postgres
    username: travel_user
    password: travel_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.spatial.dialect.postgis.PostgisPG10Dialect
        format_sql: true
    show-sql: true

  security:
    jwt:
      secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      expiration: 86400000
      refresh-expiration: 604800000

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
  # HTTPS (production) — раскомментировать при наличии keystore:
  # ssl:
  #   enabled: true
  #   key-store: classpath:keystore.p12
  #   key-store-password: ${KEYSTORE_PASSWORD}
  #   key-store-type: PKCS12

logging:
  level:
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    com.travel.ecosystem: DEBUG

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  admin:
    enabled: true
    email: admin@travel.local
    password: Admin123!
    first-name: System
    last-name: Administrator